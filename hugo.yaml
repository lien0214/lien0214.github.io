          後端 & AI 工程師 · 台大資工碩士 · MIRLab · MSLab


          我在建構可靠的分散式系統，同時研究語言模型如何學習、遺忘與記憶。
          目前在 [MIRLab](https://mirlab.org)（量化交易）和 MSLab（LLM 知識衝突）進行研究。
