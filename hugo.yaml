          weight: 1
        - name: Posts
          url: /en/posts/
          weight: 2
        - name: Projects
          url: /en/projects/
          weight: 3
        - name: Game
          url: /en/game/
          weight: 4
        - name: Search
          url: /en/search/
          weight: 5

  zh-tw:
    contentDir: content/zh-tw
    label: 中文
    weight: 2
    title: 連奕維
    params:
      authorName: 連奕維
      authorBio: "後端 & AI 工程師 · NTU CS 碩士生 · MIRLab · MSLab"
