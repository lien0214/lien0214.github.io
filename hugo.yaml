outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  author: Yi-Wei Lien
  avatar: /images/avatar/Avatar.png
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false

  profileMode:
    enabled: false

  socialIcons:
    - name: github
      url: https://github.com/lien0214
    - name: linkedin
      url: https://www.linkedin.com/in/yi-wei-lien/
    - name: email
      url: mailto:ted20030214@gmail.com

  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true

  editPost:
    URL: https://github.com/lien0214/lien0214.github.io/blob/main/content
    Text: Suggest Changes
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys:
      - title
      - permalink
      - summary
      - content

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    anchorLineNos: true
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai

minify:
  disableXML: true
  minifyOutput: true
