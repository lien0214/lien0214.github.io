<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lien0214</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', ui-monospace, monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      overflow: hidden;
    }

    /* ── Wordmark ── */
    .wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }

    .wordmark-main {
      font-size: clamp(2.2rem, 8vw, 3.6rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .wordmark-main .w-lien { color: #e6edf3; }
    .wordmark-main .w-num  { color: #58a6ff; }

    .wordmark-sub {
      font-size: clamp(0.65rem, 2vw, 0.75rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6e7681;
      font-weight: 400;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      width: 160px;
      height: 2px;
      background: #21262d;
      border-radius: 99px;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.4s ease 0.5s forwards;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #58a6ff, #79c0ff);
      border-radius: 99px;
      animation: fill 0.9s cubic-bezier(0.4, 0, 0.2, 1) 0.6s forwards;
    }

    /* ── Language hint ── */
    .lang-hint {
      position: fixed;
      bottom: 32px;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: #30363d;
      opacity: 0;
      animation: fadeUp 0.4s ease 0.8s forwards;
    }

    .lang-hint a {
      color: #58a6ff;
      text-decoration: none;
      margin: 0 8px;
      transition: color 0.15s;
    }
    .lang-hint a:hover { color: #79c0ff; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fill {
      to { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="wordmark">
    <div class="wordmark-main">
      <span class="w-lien">lien</span><span class="w-num">0214</span>
    </div>
    <div class="wordmark-sub">Backend &amp; AI Engineer</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>

  <p class="lang-hint">
    <a href="/en/">EN</a> · <a href="/zh-tw/">中文</a>
  </p>

  <script>
    // Detect browser language and redirect accordingly
    var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
    var dest = (lang.startsWith('zh')) ? '/zh-tw/' : '/en/';
    setTimeout(function() { window.location.replace(dest); }, 1000);
  </script>

</body>
</html>
